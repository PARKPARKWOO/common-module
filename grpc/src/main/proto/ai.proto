syntax = "proto3";

option java_package = "org.woo.ai.grpc";
option java_outer_classname = "AiProto";

// ============== Enums ==============

enum Vendor {
  VENDOR_UNSPECIFIED = 0;
  OPENAI = 1;
  ANTHROPIC = 2;
  GOOGLE = 3;
  X_AI = 4;
}

// ============== Chat ==============

message ChatMessage {
  string role = 1;    // "user" | "system" | "assistant"
  string content = 2;
}

message ModelSpec {
  Vendor vendor = 1;
  string version = 2;
  optional VendorOptions vendor_options = 3;
}

message VendorOptions {
  repeated string url_contexts = 1;
  optional bool enable_google_search = 2;
  repeated string tool_names = 3;
  optional bool use_cached_content = 4;
  optional string cached_content_name = 5;
  optional string cache_strategy = 6;
  optional string cache_ttl = 7;
}

message AiApiRequest {
  repeated ModelSpec models = 1;
  repeated ChatMessage messages = 2;
  string session_id = 3;
  optional string response_schema = 4;
  optional int32 timeout_seconds = 5;
  string application_id = 6;  // 호출 서비스에서 전달하는 Application 식별자 (API 키 조회용)
  optional int32 max_tokens = 7;         // 응답 최대 토큰 수 제어 (기본값: 2000)
  optional string request_type = 8;      // 요청 타입: "quiz", "review", "interview" (로깅/모니터링용)
}

message AiApiResponse {
  Vendor vendor = 1;
  string result = 2;
  bool is_error = 3;
}

// ============== Vision (Multimodal Image Input) ==============

message BytesImage {
  bytes data = 1;
  string mime_type = 2;   // "image/png", "image/jpeg", "image/webp", "image/heic", "image/heif"
}

message UrlImage {
  string url = 1;         // Full URL (recommended: Storage presigned URL)
}

message StorageKeyImage {
  string bucket = 1;
  string key = 2;
}

message ImageInput {
  oneof source {
    BytesImage bytes = 1;
    UrlImage url = 2;
    StorageKeyImage storage_key = 3;
  }
}

message AiVisionRequest {
  repeated ModelSpec models = 1;
  repeated ChatMessage messages = 2;
  repeated ImageInput images = 3;
  string application_id = 4;
  optional int32 timeout_seconds = 5;
  optional int32 max_tokens = 6;
  optional string request_type = 7;
}

message AiVisionResponse {
  Vendor vendor = 1;
  string result = 2;
  bool is_error = 3;
}

// ============== Embedding ==============

message EmbeddingModelSpec {
  Vendor vendor = 1;
  string version = 2;
  optional EmbeddingVendorOptions vendor_options = 3;
}

message EmbeddingVendorOptions {
  optional int32 dimensions = 1;
  optional string encoding_format = 2;
  optional string user = 3;
  optional string task_type = 4;
  optional string title = 5;
  optional bool auto_truncate = 6;
}

message EmbeddingApiRequest {
  repeated EmbeddingModelSpec models = 1;
  repeated string texts = 2;
  string application_id = 3;  // 호출 서비스에서 전달하는 Application 식별자 (API 키 조회용)
}

message EmbeddingVector {
  repeated float values = 1;
}

message EmbeddingApiResponse {
  Vendor vendor = 1;
  repeated EmbeddingVector embeddings = 2;
  optional int32 dimensions = 3;
  optional string model = 4;
}

// ============== Service ==============

service AiApiService {
  rpc Chat(AiApiRequest) returns (AiApiResponse);
  rpc Embedding(EmbeddingApiRequest) returns (EmbeddingApiResponse);
  rpc Vision(AiVisionRequest) returns (AiVisionResponse);
}
